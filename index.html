<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axiom Clash - Dynamic Timeline</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Smooth Iris Transition Overlay -->
<div id="transition-overlay" class="iris-overlay hidden"></div>

<!-- SCREEN 1: HOME MENU -->
<div id="menuScreen" class="screen active">
    <div class="vignette"></div>
    <div class="title-container">
        <div class="game-title">AXIOM CLASH</div>
    </div>
    <div class="press-start-wrap">
        <div class="press-start-text"><span>&lt;</span> PRESS START <span>&gt;</span></div>
    </div>
</div>

<!-- SCREEN 2: TEAM SELECT -->
<div id="teamScreen" class="screen">
    <div class="inner">
        <div class="screen-title">CHOOSE YOUR HEROES</div>
        <div class="screen-subtitle">SELECT 3 HEROES</div>
        <div class="creature-grid" id="creatureGrid"></div>
        <div class="team-preview">
            <div class="tp-label">YOUR PARTY</div>
            <div class="team-slot" id="slot0">?</div>
            <div class="team-slot" id="slot1">?</div>
            <div class="team-slot" id="slot2">?</div>
            <button class="btn-start" id="confirmBtn" onclick="confirmTeam()" disabled>FIGHT! →</button>
        </div>
    </div>
</div>

<!-- SCREEN 3: BATTLE -->
<div id="battleScreen" class="screen">
    <div class="stage" id="stage">
        
        <!-- HORIZONTAL TIMELINE -->
        <div id="turn-timeline-container">
            <div class="timeline-bg"></div>
            <div id="turn-queue"></div>
        </div>

        <div id="targetMenuOverlay" class="hidden">
            <div class="target-msg">SELECT TARGET</div>
            <div class="cancel-target" onclick="cancelTargeting()">[ CANCEL ]</div>
        </div>
        <div id="entitiesLayer"></div>
    </div>

    <!-- 1:1 JRPG HUD -->
    <div id="bottom-hud">
        <div id="party-panel" class="jrpg-window"></div>
        <div id="command-panel" class="jrpg-window">
            <div id="commandMenu" class="menu-list">
                <div class="menu-item" onclick="handleStrike()">Strike</div>
                <div class="menu-item" id="skill-btn" onclick="handleSkill()">Skill</div>
                <div class="menu-item" onclick="handleBrace()">Brace</div>
                <div class="menu-item" onclick="showInfoModal()">Info</div>
            </div>
        </div>
    </div>
</div>

<!-- INFO MODAL -->
<div id="infoModal" class="modal-overlay hidden">
    <div class="modal-box jrpg-window" style="width: 800px; max-width: 90%;">
        <div class="modal-header">BATTLEFIELD INFO</div>
        <div class="modal-body" id="infoModalBody" style="display:flex; gap:20px;"></div>
        <div class="menu-item" style="text-align: center; margin-top:20px;" onclick="closeModals()">Close</div>
    </div>
</div>

<!-- SCREEN 4: GAME OVER -->
<div id="gameoverScreen" class="screen">
    <div class="go-title" id="goTitle">—</div>
    <div class="go-sub" id="goSub">—</div>
    <div style="margin-top: 30px;">
        <button class="btn-start" onclick="location.reload()">▶ PLAY AGAIN</button>
    </div>
</div>

<script src="game.js"></script>
</body>
</html>
